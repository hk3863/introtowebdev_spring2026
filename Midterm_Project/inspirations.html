<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Inspirations | Hyein Kim</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <h1 class="site-title"><a href="./index.html">Hyein Kim</a></h1>
        <span class="mobile-menu" id="mobile-menu">&#8801;</span>
        <nav class="site-nav">
          <ul class="menu" id="menu">
            <li><a href="./index.html">Home</a></li>
            <li><a class="active" href="./inspirations.html">Inspirations</a></li>
            <li><a href="./work.html">Work</a></li>
            <li><a href="./about.html">About</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="page-section">
      <div class="container inspirations-page">
        <section class="inspirations-hero">
          <div class="inspirations-copy">
            <p class="archive-kicker">Personal Archive</p>
            <h2 class="page-title">Inspirations</h2>
          </div>
        </section>

        <section class="archive-note-row">
          <p class="archive-note-text">
            Books, films, places, and people I keep returning to.
          </p>
        </section>

        <section class="gallery-board">
          <div class="gallery-row gallery-row-top">
            <article class="gallery-item gallery-item-book">
              <div class="gallery-image">
                <img
                  src="./img/inspirations/book/fish-in-the-water.webp"
                  alt="Fish in the Water book cover"
                />
              </div>
              <div class="gallery-caption gallery-overlay">
                <p class="archive-type">Book</p>
                <h3>Fish in the Water</h3>
              </div>
            </article>

            <article class="gallery-item gallery-item-film">
              <div class="gallery-image">
                <img
                  src="./img/inspirations/film/interstellar.webp"
                  alt="Interstellar film poster"
                />
              </div>
              <div class="gallery-caption gallery-overlay">
                <p class="archive-type">Film</p>
                <h3>Interstellar</h3>
              </div>
            </article>

            <article class="gallery-item gallery-item-place">
              <div class="gallery-image">
                <img
                  src="./img/inspirations/place/london.jpg"
                  alt="London city image"
                />
              </div>
              <div class="gallery-caption gallery-overlay">
                <p class="archive-type">Place</p>
                <h3>London</h3>
              </div>
            </article>
          </div>

          <div class="gallery-row gallery-row-bottom">
            <article class="gallery-item gallery-item-person">
              <div class="gallery-image">
                <img
                  src="./img/inspirations/person/lee-chan-hyuk.webp"
                  alt="Lee Chan Hyuk portrait"
                />
              </div>
              <div class="gallery-caption gallery-overlay">
                <p class="archive-type">Person</p>
                <h3>Lee Chan Hyuk</h3>
              </div>
            </article>
          </div>
        </section>
      </div>
    </main>
    <script src="./js/nav.js"></script>
  </body>
</html>
