<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CSS Only Modal</title>
    <!-- Internal Stylesheet -->
    <style type="text/css">
      * {
        box-sizing: border-box;
      }

      html, body {
        margin: 0;
      }

      a.button {
        text-decoration: none;
        color: white;
        background-color: blueviolet;
        padding: 1rem 2rem;
        border-radius: .5rem;
        display: inline-block;
      }

      .info_modal{
        /* stretch a div to always cover the entire screen */
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        background-color: rgba(0,0,0,0.3);
        /* make super super sure that it is in fron of other content */
        z-index: 9999;
        /* starting state of 0 opacityz */
        opacity: 0;
        /* The ocontext befind the overlay not  */
        pointer-events: none;
        transition: opacity 0.5s ease;
      }

      .info_modal:target {
        /* When the modal is targeted, make it visible */
        opacity: 1;
        pointer-events: auto;
      }

      .info_modal>

      .close {
        height: 20px;
        width: 20px;
        background-color: whitesmoke;
        color: black;
        position: absolute;
        top: 0;
        
      }
    </style>
  </head>
  <body>
    <!-- Anchor tag targets another element on the page with a specific ID -->
     <!-- We will use CSS to make links look like buttons -->
      <a href="#info" class="button">Link to Modal 1</a>

      <!-- Begin Modal 1 -->
       <!-- Parent/Wrapper div which receives the ID that needs to be targeted-->
        <!-- This div will also be out transparent overlay -->
       <div id="info" class="info_modal center">

       </div>
  </body>
</html>
